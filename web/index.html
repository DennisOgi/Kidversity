<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kidversity — K-12 learning with slides, audio and rewards">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kidversity">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kidversity</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f6f5fc;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      color: #514e6a;
      gap: 16px;
    }
    #loading .logo {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: linear-gradient(135deg, #7c6cff, #6c5ce7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 16px 32px rgba(108, 92, 231, 0.35);
    }
    #loading .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #edebff;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Pulled in by supabase_flutter (passkeys_web plugin). Kidversity uses email/password only;
       this script satisfies the plugin on web. Bundled locally — no GitHub CDN at runtime. -->
  <script src="passkeys/bundle.js"></script>

  <div id="loading">
    <div class="logo">🎓</div>
    <div style="font-size: 22px; font-weight: 700; color: #1b1830;">Kidversity</div>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
